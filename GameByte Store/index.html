<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GameByte Store</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Exo+2:wght@400;600&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <body style="background-color: white"></body>
    <!-- HEADER -->
    <nav class="navbar">
      <div class="logo">
        <img src="images/LogoColor.png" alt="Logo" />
      </div>
      <ul class="nav-links">
        <li><a href="#">PlayStation</a></li>
        <li><a href="#">Xbox</a></li>
        <li><a href="#">Nintendo</a></li>
        <li><a href="#">Accesorios</a></li>
      </ul>
    </nav>

    <!-- Sección de juegos destacados -->
    <div class="games-section">
      <h2 class="section-title">Juegos Destacados</h2>

      <div class="games-container">
        <!-- Tarjeta 1 -->
        <div class="game-card">
          <img src="images/GameDestacados/God.webp" alt="God of War" />
          <div class="game-info">
            <h3 class="game-title">God of War Ragnarök</h3>
            <span class="game-console">
              <i class="fas fa-gamepad"></i> PlayStation 5
            </span>
            <button class="btn-buy">
              <i class="fas fa-cart-shopping"></i> Comprar
            </button>
          </div>
        </div>

        <!-- Tarjeta 2 -->
        <div class="game-card">
          <img src="images/GameDestacados/Halo.webp" alt="Halo Infinite" />
          <div class="game-info">
            <h3 class="game-title">Halo Infinite</h3>
            <span class="game-console">
              <i class="fas fa-gamepad"></i> Xbox Series X
            </span>
            <button class="btn-buy">
              <i class="fas fa-cart-shopping"></i> Comprar
            </button>
          </div>
        </div>

        <!-- Tarjeta 3 -->
        <div class="game-card">
          <img src="images/GameDestacados/Zelda.webp" alt="Zelda" />
          <div class="game-info">
            <h3 class="game-title">Zelda: Tears of the Kingdom</h3>
            <span class="game-console">
              <i class="fas fa-gamepad"></i> Nintendo Switch
            </span>
            <button class="btn-buy">
              <i class="fas fa-cart-shopping"></i> Comprar
            </button>
          </div>
        </div>

        <!-- Tarjeta 4 -->
        <div class="game-card">
          <img src="images/GameDestacados/Spider.webp" alt="Spider-Man" />
          <div class="game-info">
            <h3 class="game-title">Spider-Man 2</h3>
            <span class="game-console">
              <i class="fas fa-gamepad"></i> PlayStation 5
            </span>
            <button class="btn-buy">
              <i class="fas fa-cart-shopping"></i> Comprar
            </button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
